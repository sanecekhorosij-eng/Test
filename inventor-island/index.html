<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  >
  <meta name="theme-color" content="#031426">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <title>Остров изобретателя</title>

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="css/style.css?v=2">
</head>

<body>
  <main class="game" aria-label="Остров изобретателя">
    <img
      class="game__background"
      src="assets/images/island-background.png"
      alt="Остров изобретателя с панелью ресурсов, зданиями и навигацией"
      draggable="false"
    >

    <!--
      Интерфейс уже нарисован на фоновом изображении. Эти прозрачные кнопки
      добавляют взаимодействие и доступность, не дублируя значки и подписи.
    -->
    <div class="hotspots" role="group" aria-label="Интерактивные области">
      <button class="hotspot hotspot--achievements" type="button" data-action="achievements" aria-label="Достижения"></button>
      <button class="hotspot hotspot--journal" type="button" data-action="journal" aria-label="Журнал"></button>
      <button class="hotspot hotspot--settings" type="button" data-action="settings" aria-label="Настройки"></button>

      <button class="hotspot hotspot--generator" type="button" data-building="generator" aria-label="Генератор, уровень 1"></button>
      <button class="hotspot hotspot--mine" type="button" data-building="mine" aria-label="Открыть шахту"></button>
      <button class="hotspot hotspot--workshop" type="button" data-building="workshop" aria-label="Мастерская, уровень 1"></button>
      <button class="hotspot hotspot--administration" type="button" data-building="administration" aria-label="Открыть администрацию"></button>
      <button class="hotspot hotspot--laboratory" type="button" data-building="laboratory" data-locked="true" aria-label="Лаборатория, откроется на уровне 2"></button>

      <nav class="navigation-hotspots" aria-label="Основная навигация">
        <button class="navigation-hotspot is-active" type="button" data-page="island" aria-label="Остров"></button>
        <button class="navigation-hotspot" type="button" data-page="inventions" aria-label="Изобретения"></button>
        <button class="navigation-hotspot" type="button" data-page="blueprints" aria-label="Чертежи"></button>
        <button class="navigation-hotspot" type="button" data-page="collection" aria-label="Коллекция"></button>
        <button class="navigation-hotspot" type="button" data-page="achievements" aria-label="Достижения"></button>
      </nav>
    </div>

    <div class="notification" id="notification" role="status" aria-live="polite"></div>
  </main>

  <script src="js/app.js?v=2"></script>
</body>
</html>
