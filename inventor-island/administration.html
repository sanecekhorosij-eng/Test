<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  >
  <meta name="theme-color" content="#031426">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <title>Администрация — Остров изобретателя</title>

  <link rel="stylesheet" href="css/administration.css">
</head>

<body>
  <main class="administration" aria-label="Административный центр острова">
    <div class="administration__background" aria-hidden="true"></div>

    <header class="administration__header">
      <a class="back-button" href="index.html" aria-label="Вернуться на остров">
        <span aria-hidden="true">←</span>
        <span>Остров</span>
      </a>

      <h1>Административный центр</h1>
    </header>

    <section class="administration__scene" aria-label="Здания административного центра">
      <button
        class="department department--blueprints"
        type="button"
        data-department="blueprints"
        aria-label="Отдел проектирования чертежей"
      >
        <span class="department__fallback" aria-hidden="true">▤</span>
        <img
          class="department__image"
          src="assets/images/blueprint-station.png"
          alt=""
          draggable="false"
        >
        <span class="department__title">Отдел проектирования<br>чертежей</span>
      </button>

      <button
        class="department department--administration"
        type="button"
        data-department="administration"
        aria-label="Центральное здание администрации"
      >
        <span class="department__fallback" aria-hidden="true">A</span>
        <img
          class="department__image"
          src="assets/images/administration-building.png"
          alt=""
          draggable="false"
        >
        <span class="department__title">Центральная<br>администрация</span>
      </button>

      <button
        class="department department--inventions"
        type="button"
        data-department="inventions"
        aria-label="Лаборатория изобретений"
      >
        <span class="department__fallback" aria-hidden="true">💡</span>
        <img
          class="department__image"
          src="assets/images/invention-lab.png"
          alt=""
          draggable="false"
        >
        <span class="department__title">Лаборатория<br>изобретений</span>
      </button>
    </section>

    <div class="notification" id="notification" role="status" aria-live="polite"></div>
  </main>

  <script src="js/administration.js"></script>
</body>
</html>
