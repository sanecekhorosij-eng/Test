<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  >

  <meta name="theme-color" content="#031426">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="black-translucent"
  >

  <title>Администрация — Остров изобретателя</title>

  <link rel="stylesheet" href="css/administration.css">
</head>

<body>
  <main
    class="administration"
    aria-label="Административный центр острова"
  >
    <!-- Отдельный фон администрации -->
    <img
      class="administration__background"
      src="assets/images/administration-background.png"
      alt=""
      draggable="false"
    >

    <!-- Центральная администрация -->
    <button
      class="department department--administration"
      type="button"
      data-department="administration"
      aria-label="Открыть центральную администрацию"
    >
      <img
        src="assets/images/city-hall.png"
        alt=""
        draggable="false"
      >
    </button>

    <!-- Отдел чертежей -->
    <button
      class="department department--blueprints"
      type="button"
      data-department="blueprints"
      aria-label="Открыть отдел чертежей"
    >
      <img
        src="assets/images/control-station.png"
        alt=""
        draggable="false"
      >
    </button>

    <!-- Отдел изобретений -->
    <button
      class="department department--inventions"
      type="button"
      data-department="inventions"
      aria-label="Открыть отдел изобретений"
    >
      <img
        src="assets/images/energy-generator.png"
        alt=""
        draggable="false"
      >
    </button>

    <!-- Верхняя и нижняя панели -->
    <img
      class="administration__interface"
      src="assets/images/game-ui-overlay.png"
      alt=""
      draggable="false"
      aria-hidden="true"
    >

    <!-- Стрелка возвращает на главную страницу -->
    <a
      class="interface-hotspot back-hotspot"
      href="index.html"
      aria-label="Вернуться на главный остров"
    ></a>

    <!-- Верхние служебные кнопки -->
    <div
      class="utility-hotspots"
      role="group"
      aria-label="Служебное меню"
    >
      <button
        class="interface-hotspot utility-hotspot"
        type="button"
        data-utility="achievements"
        aria-label="Достижения"
      ></button>

      <button
        class="interface-hotspot utility-hotspot"
        type="button"
        data-utility="guide"
        aria-label="Справочник"
      ></button>

      <button
        class="interface-hotspot utility-hotspot"
        type="button"
        data-utility="settings"
        aria-label="Настройки"
      ></button>
    </div>

    <!-- Нижняя навигация -->
    <nav
      class="navigation-hotspots"
      aria-label="Переходы по локациям"
    >
      <a
        class="interface-hotspot navigation-hotspot is-active"
        href="index.html"
        aria-label="Перейти на остров"
      ></a>

      <button
        class="interface-hotspot navigation-hotspot"
        type="button"
        data-page="inventions"
        aria-label="Изобретения"
      ></button>

      <button
        class="interface-hotspot navigation-hotspot"
        type="button"
        data-page="blueprints"
        aria-label="Чертежи"
      ></button>

      <button
        class="interface-hotspot navigation-hotspot"
        type="button"
        data-page="laboratory"
        aria-label="Лаборатория"
      ></button>

      <button
        class="interface-hotspot navigation-hotspot"
        type="button"
        data-page="collection"
        aria-label="Коллекция"
      ></button>

      <button
        class="interface-hotspot navigation-hotspot"
        type="button"
        data-page="achievements"
        aria-label="Достижения"
      ></button>
    </nav>

    <!-- Карточка выбранного объекта -->
    <aside
      class="department-info"
      id="department-info"
      aria-live="polite"
      hidden
    >
      <div>
        <span class="department-info__label">
          Выбранный объект
        </span>

        <h2 id="department-title"></h2>
        <p id="department-description"></p>
      </div>

      <button
        class="department-info__close"
        id="close-info"
        type="button"
        aria-label="Закрыть описание"
      >
        ×
      </button>
    </aside>

    <!-- Всплывающее сообщение -->
    <div
      class="notification"
      id="notification"
      role="status"
      aria-live="polite"
    ></div>

    <div class="rotate-message">
      Поверните устройство горизонтально
    </div>
  </main>

  <script src="js/administration.js"></script>
</body>
</html>
