<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#020b24" />
  <title>Space App</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      background: #020b24;
    }

    body {
      min-height: 100svh;
      background-image:
        linear-gradient(rgba(0, 8, 30, 0.04), rgba(0, 8, 30, 0.12)),
        url("./space-background.png");
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
      touch-action: manipulation;
      user-select: none;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100svh;
      overflow: hidden;
      padding-top: env(safe-area-inset-top);
      padding-right: env(safe-area-inset-right);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
    }

    .vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 45%, transparent 45%, rgba(0, 4, 20, 0.22) 100%);
    }

    .stage {
      position: absolute;
      inset: 0;
    }
  </style>
</head>
<body>
  <main id="app" aria-label="Игровая сцена">
    <section class="stage" id="stage"></section>
    <div class="vignette" aria-hidden="true"></div>
  </main>

  <script>
    "use strict";

    const stage = document.getElementById("stage");

    stage.addEventListener("pointerdown", (event) => {
      // Здесь позже подключим персонажей и движение по тапу.
      stage.dataset.lastTapX = String(event.clientX);
      stage.dataset.lastTapY = String(event.clientY);
    });
  </script>
</body>
</html>
