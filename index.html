<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#020b24" />
  <title>Space App</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; min-height: 100%; margin: 0; overflow: hidden; background: #020b24; }
    body {
      min-height: 100svh;
      background-image: url("./space-background.PNG");
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
      touch-action: manipulation;
      user-select: none;
    }
    #app {
      position: relative;
      width: 100%;
      height: 100svh;
      overflow: hidden;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    .stage { position: absolute; inset: 0; }
  </style>
</head>
<body>
  <main id="app" aria-label="Игровая сцена">
    <section class="stage" id="stage"></section>
  </main>
  <script>
    "use strict";
    const stage = document.getElementById("stage");
    stage.addEventListener("pointerdown", (event) => {
      stage.dataset.lastTapX = String(event.clientX);
      stage.dataset.lastTapY = String(event.clientY);
    });
  </script>
</body>
</html>
