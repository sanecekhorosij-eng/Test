<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#020812" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Space Station</title>
  <link rel="stylesheet" href="styles.css?v=7" />
</head>
<body>
  <main id="app" aria-live="polite">
    <section class="screen active" data-page="home" style="--ratio:1024/1536" aria-hidden="false">
      <img id="home-image" alt="Главный экран космической станции" draggable="false" />
      <button type="button" class="hotspot settings" data-go="settings" aria-label="Настройки"></button>
      <button type="button" class="hotspot wheel" data-go="wheel" aria-label="Колесо фортуны"></button>
      <button type="button" class="hotspot chest" data-go="chest" aria-label="Сундук"></button>
      <button type="button" class="hotspot card collection" data-soon="Коллекция" aria-label="Коллекция"></button>
      <button type="button" class="hotspot card laboratory" data-soon="Лаборатория" aria-label="Лаборатория"></button>
      <button type="button" class="hotspot card mine" data-soon="Майн станция" aria-label="Майн станция"></button>
      <button type="button" class="hotspot card digs" data-soon="Раскопки" aria-label="Раскопки"></button>
    </section>

    <section class="screen" data-page="chest" style="--ratio:991/1500" hidden aria-hidden="true">
      <img src="assets/IMG_1797.jpeg?v=7" alt="Экран сундука" draggable="false" />
      <button type="button" class="hotspot back" data-back aria-label="Назад"></button>
      <button type="button" class="hotspot chest-open" data-action="open-chest" aria-label="Открыть сундук сейчас"></button>
    </section>

    <section class="screen" data-page="wheel" style="--ratio:960/1639" hidden aria-hidden="true">
      <img src="assets/IMG_1813.jpeg?v=7" alt="Колесо фортуны" draggable="false" />
      <button type="button" class="hotspot back" data-back aria-label="Назад"></button>
      <button type="button" class="hotspot spin" data-action="spin-wheel" aria-label="Крутить колесо"></button>
      <button type="button" class="hotspot watch" data-action="watch-video" aria-label="Смотреть видео"></button>
    </section>

    <section class="screen" data-page="settings" style="--ratio:960/2048" hidden aria-hidden="true">
      <img src="assets/56CDE2CE-C749-4CA1-A529-90AC4F0A7D57.png?v=7" alt="Настройки" draggable="false" />
      <button type="button" class="hotspot back" data-back aria-label="Назад"></button>
      <button type="button" class="hotspot setting-row account" data-setting="Аккаунт" aria-label="Аккаунт"></button>
      <button type="button" class="hotspot setting-row sound" data-setting="Звук" aria-label="Звук"></button>
      <button type="button" class="hotspot setting-row language" data-setting="Язык" aria-label="Язык"></button>
      <button type="button" class="hotspot setting-row notifications" data-action="toggle-notifications" aria-label="Уведомления"></button>
      <button type="button" class="hotspot setting-row support" data-setting="Поддержка" aria-label="Поддержка"></button>
    </section>
  </main>

  <div id="toast" role="status" aria-live="polite"></div>
  <script src="app.js?v=7"></script>
</body>
</html>
