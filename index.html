<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#020812" />
  <title>Space Station</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main id="app" aria-live="polite">
    <section class="screen active" data-page="home" style="--ratio: 1022/1536">
      <img src="assets/home.jpeg" alt="Главный экран космической станции" draggable="false" />
      <button class="hotspot settings" data-go="settings" aria-label="Настройки"></button>
      <button class="hotspot wheel" data-go="wheel" aria-label="Колесо фортуны"></button>
      <button class="hotspot chest" data-go="chest" aria-label="Сундук"></button>
      <button class="hotspot card collection" data-soon="Коллекция" aria-label="Коллекция"></button>
      <button class="hotspot card laboratory" data-soon="Лаборатория" aria-label="Лаборатория"></button>
      <button class="hotspot card mine" data-soon="Майн станция" aria-label="Майн станция"></button>
      <button class="hotspot card digs" data-soon="Раскопки" aria-label="Раскопки"></button>
    </section>

    <section class="screen" data-page="chest" style="--ratio: 1320/2024">
      <img src="assets/chest.jpeg" alt="Экран сундука" draggable="false" />
      <button class="hotspot back" data-go="home" aria-label="Назад"></button>
      <button class="hotspot chest-open" data-action="open-chest" aria-label="Открыть сундук сейчас"></button>
    </section>

    <section class="screen" data-page="wheel" style="--ratio: 1316/2315">
      <img src="assets/wheel.jpeg" alt="Колесо фортуны" draggable="false" />
      <button class="hotspot back" data-go="home" aria-label="Назад"></button>
      <button class="hotspot spin" data-action="spin-wheel" aria-label="Крутить колесо"></button>
      <button class="hotspot watch" data-action="watch-video" aria-label="Смотреть видео"></button>
    </section>

    <section class="screen" data-page="settings" style="--ratio: 1320/2234">
      <img src="assets/settings.jpeg" alt="Настройки" draggable="false" />
      <button class="hotspot back" data-go="home" aria-label="Назад"></button>
      <button class="hotspot setting-row account" data-setting="Аккаунт"></button>
      <button class="hotspot setting-row sound" data-setting="Звук"></button>
      <button class="hotspot setting-row language" data-setting="Язык"></button>
      <button class="hotspot setting-row notifications" data-action="toggle-notifications"></button>
      <button class="hotspot setting-row support" data-setting="Поддержка"></button>
    </section>
  </main>

  <div id="toast" role="status" aria-live="polite"></div>
  <script src="app.js"></script>
</body>
</html>
