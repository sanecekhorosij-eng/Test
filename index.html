<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#020b24" />
  <title>Space App</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #020b24;
    }
    body { touch-action: manipulation; user-select: none; }
    #app {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      background: #020b24;
    }
    #spaceBackground {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center;
      pointer-events: none;
    }
    .stage {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: end center;
      padding-bottom: max(4vh, env(safe-area-inset-bottom));
    }
    .worker {
      width: min(46vw, 290px);
      aspect-ratio: 341 / 1000;
      border: 0;
      padding: 0;
      cursor: pointer;
      background-color: transparent;
      background-image: url("/Test/worker-sprites.PNG?v=2");
      background-repeat: no-repeat;
      background-size: 300% 153.6%;
      background-position-y: 17%;
      background-position-x: 50%;
      filter: drop-shadow(0 18px 18px rgba(0,0,0,.42));
      transform-origin: 50% 100%;
      touch-action: manipulation;
    }
    .worker.frame-left { background-position-x: 0%; }
    .worker.frame-right { background-position-x: 100%; }
    .worker.hop { animation: hop 360ms cubic-bezier(.2,.75,.25,1); }
    @keyframes hop {
      0% { transform: translateY(0) rotate(0deg) scale(1); }
      38% { transform: translateY(-42px) rotate(var(--tilt, 0deg)) scale(1.025); }
      68% { transform: translateY(-14px) rotate(var(--tilt, 0deg)) scale(1.01); }
      100% { transform: translateY(0) rotate(0deg) scale(1); }
    }
    .hint {
      position: absolute;
      left: 50%;
      bottom: calc(max(1.5vh, env(safe-area-inset-bottom)) + 2px);
      transform: translateX(-50%);
      color: rgba(255,255,255,.82);
      font: 600 13px/1.2 system-ui, sans-serif;
      text-shadow: 0 1px 6px rgba(0,0,0,.8);
      pointer-events: none;
      white-space: nowrap;
    }
    .error {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      padding: 24px;
      color: white;
      text-align: center;
      font: 16px/1.4 system-ui, sans-serif;
      background: #020b24;
    }
  </style>
</head>
<body>
  <main id="app" aria-label="Игровая сцена">
    <img id="spaceBackground" src="/Test/space-background.PNG?v=20260713-2" alt="" />
    <section class="stage" id="stage">
      <button class="worker" id="worker" type="button" aria-label="Перепрыгнуть на другую ногу"></button>
      <div class="hint">Нажми на персонажа</div>
    </section>
    <div class="error" id="imageError">Фоновое изображение не загрузилось.</div>
  </main>
  <script>
    "use strict";
    const image = document.getElementById("spaceBackground");
    const imageError = document.getElementById("imageError");
    const worker = document.getElementById("worker");
    let onLeftLeg = false;
    let locked = false;

    image.addEventListener("error", () => {
      imageError.style.display = "grid";
    });

    worker.addEventListener("pointerdown", (event) => {
      event.preventDefault();
      if (locked) return;
      locked = true;
      onLeftLeg = !onLeftLeg;

      worker.classList.remove("hop", "frame-left", "frame-right");
      worker.style.setProperty("--tilt", onLeftLeg ? "-2deg" : "2deg");
      void worker.offsetWidth;
      worker.classList.add(onLeftLeg ? "frame-left" : "frame-right", "hop");

      window.setTimeout(() => {
        worker.classList.remove("hop");
        locked = false;
      }, 380);
    });
  </script>
</body>
</html>
