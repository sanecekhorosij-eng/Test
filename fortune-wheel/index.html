<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Колесо фортуны</title><style>*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:Arial,sans-serif;background:radial-gradient(circle at 50% 25%,#0b2850 0,#061325 36%,#01050c 75%);color:#fff}body{display:grid;place-items:center;padding:20px}.app{width:min(94vw,520px);text-align:center}.title{font-size:clamp(28px,7vw,52px);font-weight:900;letter-spacing:.04em;text-shadow:0 0 18px #1fa8ff;margin:4px 0 8px}.sub{color:#b9ddf4;margin-bottom:24px}.wheelBox{position:relative;width:100%;aspect-ratio:1}.pointer{position:absolute;z-index:5;left:50%;top:-6px;transform:translateX(-50%);width:0;height:0;border-left:22px solid transparent;border-right:22px solid transparent;border-top:58px solid #ffd24a;filter:drop-shadow(0 0 10px #ff9d00)}.wheel{width:100%;height:100%;border-radius:50%;border:12px solid #b87916;box-shadow:0 0 0 6px #102a44,0 0 35px #169dff,inset 0 0 30px #000;transition:transform 4.6s cubic-bezier(.06,.88,.12,1);background:conic-gradient(from -15deg,#0a7044 0 30deg,#9a5b05 30deg 60deg,#0f4f89 60deg 90deg,#612697 90deg 120deg,#08713f 120deg 150deg,#a15f05 150deg 180deg,#0b4d84 180deg 210deg,#76258a 210deg 240deg,#0d6b43 240deg 270deg,#9b630b 270deg 300deg,#104f80 300deg 330deg,#662486 330deg 360deg);position:relative}.hub{position:absolute;inset:39%;border-radius:50%;background:radial-gradient(circle,#dff8ff 0 12%,#16a9ff 13% 32%,#092c57 33% 65%,#c78918 66% 78%,#071426 79%);box-shadow:0 0 18px #19b7ff}.labels{position:absolute;inset:0;pointer-events:none}.label{position:absolute;left:50%;top:50%;width:100px;margin-left:-50px;margin-top:-14px;text-align:center;font-weight:800;font-size:13px;transform-origin:50% 14px;text-shadow:0 2px 4px #000}.spin{margin-top:26px;width:78%;padding:18px 20px;border:0;border-radius:16px;background:linear-gradient(#ffd95d,#d98a00);color:#fff;font-size:30px;font-weight:900;box-shadow:0 0 22px #ffad00;cursor:pointer}.spin:disabled{filter:grayscale(.5);opacity:.7}.result{min-height:42px;margin-top:18px;font-size:24px;font-weight:900;color:#ffe581;text-shadow:0 0 10px #ffad00}</style></head><body><main class="app"><div class="title">КОЛЕСО ФОРТУНЫ</div><div class="sub">Нажмите кнопку — колесо плавно остановится на награде</div><div class="wheelBox"><div class="pointer"></div><div id="wheel" class="wheel"></div><div class="hub"></div><div id="labels" class="labels"></div></div><button id="spin" class="spin">КРУТИТЬ</button><div id="result" class="result"></div></main><script>const prizes=['100 энергии','50 000 монет','200 кристаллов','10 ускорителей','Редкий сундук','10 000 монет','50 энергии','500 кристаллов','Билет','5 ускорителей','25 000 монет','Эпический сундук'];const wheel=document.getElementById('wheel'),btn=document.getElementById('spin'),res=document.getElementById('result'),labels=document.getElementById('labels');prizes.forEach((p,i)=>{const e=document.createElement('div');e.className='label';const a=i*30+15;e.style.transform=`rotate(${a}deg) translateY(-41vw) rotate(${-a}deg)`;e.style.maxWidth='100px';e.textContent=p;labels.appendChild(e)});let rotation=0,spinning=false;const norm=a=>((a%360)+360)%360;btn.onclick=()=>{if(spinning)return;spinning=true;btn.disabled=true;res.textContent='';const i=Math.floor(Math.random()*prizes.length),center=i*30+15,current=norm(rotation),desired=norm(360-center),correction=norm(desired-current),turns=6+Math.floor(Math.random()*3);rotation+=turns*360+correction;wheel.style.transform=`rotate(${rotation}deg)`;setTimeout(()=>{res.textContent='Вы выиграли: '+prizes[i];btn.disabled=false;spinning=false},4600)};</script></body></html>
